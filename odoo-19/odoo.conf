[options]
admin_passwd = admin_master_pass

; PostgreSQL — reuses the already-running mypostgresql_db-container over my_docker_network
; (shared with the Odoo 17 stack; this stack uses its own database, see dbfilter).
db_host = mypostgresql_db-container
db_port = 5432
db_user = odoo
db_password = odoo_pass
dbfilter = ^odoo19.*$

; Core addons (in-source) + your custom modules.
addons_path = /myodoo/odoo/addons,/myodoo/addons
data_dir = /mountspace/myodoo/odoo-19/data
logfile = /mountspace/logs/myworkspace/projectspace/myodoo/odoo-19/odoo_log.log

services:

  # ── Odoo (Community) ──────────────────────────────────────────────────────────
  # Database is NOT defined here — Odoo reuses the existing mypostgresql_db-container
  # reachable over the shared external "ums-network" at mypostgresql_db-container:5432.
  odoo:
    image: odoo:${ODOO_VERSION}
    container_name: myodoo-app
    restart: unless-stopped
    ports:
      - "${ODOO_PORT}:8069"               # web UI
      - "${ODOO_LONGPOLLING_PORT}:8072"   # longpolling (live chat / bus)
    environment:
      LOG_MIRROR_ROOT: /mountspace/logs/myworkspace/projectspace/myodoo
    volumes:
      - myodoo-data:/var/lib/odoo                       # filestore (attachments, sessions)
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro       # server config (DB creds live here)
      - ./addons:/mnt/extra-addons                      # your custom / OCA modules
      - ../../mountspace/logs:/mountspace/logs          # mirror-logging mount
    networks:
      - ums-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8069/web/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  myodoo-data:

# ums-network is created/owned by mypostgresql_db (start.sh). We attach to it as external.
networks:
  ums-network:
    external: true

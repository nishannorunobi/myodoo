[options]
; ── Master / admin password ──────────────────────────────────────────────────
; Required to create, duplicate, back up, or delete databases from the web UI.
; CHANGE THIS before exposing Odoo anywhere beyond localhost.
admin_passwd = admin_master_pass

; ── Database (reuses mypostgresql_db-container on my_docker_network) ────────────────
db_host = mypostgresql_db-container
db_port = 5432
db_user = odoo
db_password = odoo_pass
; Restrict the DB manager to Odoo-owned databases so the UMS DB is never listed.
dbfilter = ^myodoo.*$
list_db = True

; ── Addons ───────────────────────────────────────────────────────────────────
; /mnt/extra-addons is your ./addons mount; the second path is the built-in core.
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; ── Logging (mirror-logging convention) ──────────────────────────────────────
logfile = /mountspace/logs/myworkspace/projectspace/myodoo/odoo_log.log
log_level = info

; ── Web / proxy ──────────────────────────────────────────────────────────────
; Enable when running behind a reverse proxy (nginx) so Odoo trusts X-Forwarded-*.
proxy_mode = True
